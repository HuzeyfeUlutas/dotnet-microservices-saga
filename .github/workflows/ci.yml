name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore, build, test, and package audit
        run: ./scripts/check-local.sh

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 8.0.4

      - name: Validate migration commands
        run: DRY_RUN=true ./scripts/apply-migrations.sh
