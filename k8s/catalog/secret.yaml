# Secret = parola/bağlantı dizesi gibi hassas değerler. compose'da bunlar
# da environment içindeydi; k8s'de ayrı bir nesneye taşıyıp RBAC ile
# koruyoruz. "stringData" düz metin yazmamıza izin verir, k8s base64'ler.
# NOT: Bunlar demo değerleri. Üretimde Secret'ları repoya koymaz;
# Sealed Secrets / External Secrets / CI secret store kullanırsın.
apiVersion: v1
kind: Secret
metadata:
  name: catalog-secrets
type: Opaque
stringData:
  # Parola bağlantı dizesinin içinde olduğu için TÜM dizeyi Secret'a koyuyoruz
  ConnectionStrings__CatalogDatabase: "Host=catalog-db;Port=5432;Database=catalogdb;Username=postgres;Password=postgres"
  RabbitMq__Password: "guest"
