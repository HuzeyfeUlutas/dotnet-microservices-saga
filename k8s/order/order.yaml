# Order servisi — ORKESTRATÖR. gRPC sunucusu YOK; diğer servislerin gRPC
# uçlarını (8081) ServiceEndpoints ile ÇAĞIRIR. Sadece HTTP açar.
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-config
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  ASPNETCORE_URLS: "http://+:8080"
  # gRPC client hedefleri — diğer servislerin Service adı + gRPC portu (8081)
  ServiceEndpoints__CatalogGrpcUrl: "http://catalog-api:8081"
  ServiceEndpoints__CatalogGrpcTimeoutSeconds: "3"
  ServiceEndpoints__InventoryGrpcUrl: "http://inventory-api:8081"
  ServiceEndpoints__InventoryGrpcTimeoutSeconds: "3"
  ServiceEndpoints__PaymentGrpcUrl: "http://payment-api:8081"
  ServiceEndpoints__PaymentGrpcTimeoutSeconds: "3"
  RabbitMq__Host: "rabbitmq"
  RabbitMq__Port: "5672"
  RabbitMq__VirtualHost: "/"
  RabbitMq__Username: "guest"
  ElasticSearch__Uri: "http://elasticsearch:9200"
  OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
---
apiVersion: v1
kind: Secret
metadata:
  name: order-secrets
type: Opaque
stringData:
  ConnectionStrings__OrderDatabase: "Host=order-db;Port=5432;Database=orderdb;Username=postgres;Password=postgres"
  RabbitMq__Password: "guest"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  labels: { app: order-api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: order-api }
  template:
    metadata:
      labels: { app: order-api }
    spec:
      containers:
        - name: order-api
          image: ghcr.io/marketplace/order-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef: { name: order-config }
            - secretRef: { name: order-secrets }
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          startupProbe:
            httpGet: { path: /health/ready, port: 8080 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
spec:
  type: ClusterIP
  selector: { app: order-api }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
