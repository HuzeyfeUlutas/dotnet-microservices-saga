# Notification servisi — event consumer (gRPC SUNUCUSU yok), sadece HTTP.
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  ASPNETCORE_URLS: "http://+:8080"
  RabbitMq__Host: "rabbitmq"
  RabbitMq__Port: "5672"
  RabbitMq__VirtualHost: "/"
  RabbitMq__Username: "guest"
  ElasticSearch__Uri: "http://elasticsearch:9200"
  OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-secrets
type: Opaque
stringData:
  ConnectionStrings__NotificationDatabase: "Host=notification-db;Port=5432;Database=notificationdb;Username=postgres;Password=postgres"
  RabbitMq__Password: "guest"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  labels: { app: notification-api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: notification-api }
  template:
    metadata:
      labels: { app: notification-api }
    spec:
      containers:
        - name: notification-api
          image: ghcr.io/marketplace/notification-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef: { name: notification-config }
            - secretRef: { name: notification-secrets }
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          startupProbe:
            httpGet: { path: /health/ready, port: 8080 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
spec:
  type: ClusterIP
  selector: { app: notification-api }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
