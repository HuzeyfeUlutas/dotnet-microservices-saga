# ───────────────────────── VERİTABANLARI (DB-per-service) ─────────────────────────
# YENİ KAVRAM: StatefulSet (Deployment DEĞİL).
#  - Deployment pod'ları kullan-at + rastgele adlandırır; veriyi umursamaz.
#  - StatefulSet pod'lara STABİL kimlik (catalog-db-0) verir ve
#    volumeClaimTemplates ile her pod'a KENDİ kalıcı diskini (PVC) bağlar.
#  - PVC (PersistentVolumeClaim): pod ölse/yeniden başlasa bile veri KALIR.
#  - Headless Service (clusterIP: None): pod'a stable DNS adı verir; istemci
#    "catalog-db" adıyla doğrudan pod'a ulaşır (compose'daki host adıyla aynı).
# Tüm DB'ler ortak kimlik bilgisi Secret'ını paylaşır (parola = demo).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
---
# ===== catalog-db =====
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
spec:
  clusterIP: None
  selector: { app: catalog-db }
  ports: [{ name: postgres, port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: catalog-db
spec:
  serviceName: catalog-db
  replicas: 1
  selector:
    matchLabels: { app: catalog-db }
  template:
    metadata:
      labels: { app: catalog-db }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports: [{ name: postgres, containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: catalogdb }
          envFrom:
            - secretRef: { name: postgres-credentials }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres", "-d", "catalogdb"] }
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 1Gi } }
---
