# API Gateway (YARP) — tek dış giriş noktası. ReverseProxy hedefleri
# servislerin Service adlarına (ClusterIP) gider. JWT'yi Keycloak'a göre doğrular.
# DB/RabbitMQ kullanmaz → Secret yok, sadece ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  ASPNETCORE_URLS: "http://+:8080"
  ReverseProxy__Clusters__catalog__Destinations__catalog__Address: "http://catalog-api:8080/"
  ReverseProxy__Clusters__inventory__Destinations__inventory__Address: "http://inventory-api:8080/"
  ReverseProxy__Clusters__notification__Destinations__notification__Address: "http://notification-api:8080/"
  ReverseProxy__Clusters__payment__Destinations__payment__Address: "http://payment-api:8080/"
  ReverseProxy__Clusters__order__Destinations__order__Address: "http://order-api:8080/"
  Gateway__Authentication__Enabled: "true"
  # Cluster içinde Keycloak'a Service adıyla erişilir.
  # NOT: Keycloak token'ın "issuer" claim'i ile ValidIssuer eşleşmeli. Gerçek
  # deploy'da Keycloak'ın frontend/hostname URL'ini buna göre ayarlamak gerekir.
  Gateway__Authentication__Authority: "http://keycloak:8080/realms/marketplace"
  Gateway__Authentication__Audience: "marketplace-api"
  Gateway__Authentication__ValidIssuer: "http://keycloak:8080/realms/marketplace"
  Gateway__Authentication__RequireHttpsMetadata: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels: { app: api-gateway }
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/marketplace/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef: { name: gateway-config }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "384Mi" }
          startupProbe:
            httpGet: { path: /health/ready, port: 8080 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: ClusterIP
  selector: { app: api-gateway }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
