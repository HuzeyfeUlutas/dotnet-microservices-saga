syntax = "proto3";

option csharp_namespace = "Marketplace.Grpc.Catalog.V1";

package marketplace.catalog.v1;

service CatalogPurchaseInfo {
  rpc GetPurchaseInfo (GetPurchaseInfoRequest) returns (GetPurchaseInfoResponse);
}

message GetPurchaseInfoRequest {
  string product_id = 1;
  string sku = 2;
}

message GetPurchaseInfoResponse {
  string product_id = 1;
  string product_name = 2;
  string sku = 3;
  string variant_name = 4;
  string unit_price = 5;
  string currency = 6;
  int32 product_status = 7;
  int32 variant_status = 8;
  string brand_id = 9;
  string category_id = 10;
  bool is_purchasable = 11;
  string not_purchasable_reason = 12;
}
