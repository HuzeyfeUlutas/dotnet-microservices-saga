apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: elasticsearch
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true

  - name: Elasticsearch
    type: elasticsearch
    uid: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "*-logs-*"
    editable: false
    jsonData:
      index: "*-logs-*"
      interval: Daily
      timeField: "@timestamp"
