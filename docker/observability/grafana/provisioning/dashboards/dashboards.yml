apiVersion: 1

providers:
  - name: Marketplace
    orgId: 1
    folder: Marketplace
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
