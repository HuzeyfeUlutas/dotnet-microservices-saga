global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: catalog-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - catalog-api:8080

  - job_name: inventory-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - inventory-api:8080

  - job_name: notification-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - notification-api:8080

  - job_name: payment-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - payment-api:8080

  - job_name: order-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - order-api:8080

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
